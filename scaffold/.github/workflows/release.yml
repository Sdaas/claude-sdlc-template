name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write   # required to create GitHub Release and upload assets
  id-token: write   # required for PyPI trusted publishing (if used)

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Validate tag — ensure tag version matches pyproject.toml version
  # ─────────────────────────────────────────────────────────────────────────
  validate-tag:
    name: Validate Tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
        with:
          persist-credentials: false

      - name: Validate tag matches pyproject.toml version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          TOML_VERSION=$(grep '^version' pyproject.toml \
            | head -1 \
            | sed 's/version = "\(.*\)"/\1/')

          echo "Tag version:    ${TAG_VERSION}"
          echo "pyproject.toml: ${TOML_VERSION}"

          if [ "${TAG_VERSION}" != "${TOML_VERSION}" ]; then
            echo "ERROR: Tag version ${TAG_VERSION} does not match"
            echo "       pyproject.toml version ${TOML_VERSION}"
            echo ""
            echo "Use release.sh to create releases — it keeps these in sync."
            exit 1
          fi

          echo "Version validated: ${TAG_VERSION}"

  # ─────────────────────────────────────────────────────────────────────────
  # Build — wheel and sdist
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: validate-tag

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@f0ec1fc3b38f5e7cd731bb6ce540c88dd8fabb67  # v3
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Run full test suite before building
        run: |
          uv sync --frozen
          uv run pytest
          uv run ruff check .
          uv run mypy src/

      - name: Build wheel and sdist
        run: uv build

      - name: Verify build artifacts
        run: |
          ls -la dist/
          echo "Built artifacts:"
          for f in dist/*; do
            echo "  ${f} ($(du -sh "${f}" | cut -f1))"
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────
  # Release — create GitHub Release with built artifacts
  # ─────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
        with:
          persist-credentials: false
          fetch-depth: 0  # needed for --generate-notes

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "Release ${GITHUB_REF_NAME}" \
            --generate-notes \
            dist/*.whl \
            dist/*.tar.gz

      - name: Output release URL
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_URL=$(gh release view "${GITHUB_REF_NAME}" --json url --jq '.url')
          echo "Release published: ${RELEASE_URL}"

  # ─────────────────────────────────────────────────────────────────────────
  # Verify — confirm Homebrew installation after release
  # Runs on macOS to test the actual Homebrew install path
  # ─────────────────────────────────────────────────────────────────────────
  verify:
    name: Post-Release Homebrew Verification
    runs-on: macos-latest
    needs: release
    # Only runs if the tap formula was updated — controlled by release.sh
    # To skip this job, set the NO_HOMEBREW_VERIFY env var in repo settings
    if: vars.NO_HOMEBREW_VERIFY != 'true'

    steps:
      - name: Wait for Homebrew tap to propagate
        run: sleep 30

      - name: Tap and install via Homebrew
        env:
          TAP_NAME: ${{ vars.HOMEBREW_TAP_NAME }}
          PROJECT_NAME: ${{ vars.PROJECT_NAME }}
        run: |
          if [ -z "${TAP_NAME}" ] || [ -z "${PROJECT_NAME}" ]; then
            echo "HOMEBREW_TAP_NAME or PROJECT_NAME not set in repository variables."
            echo "Set these in Settings → Variables to enable post-release verification."
            echo "Skipping Homebrew verification."
            exit 0
          fi

          brew tap "${TAP_NAME}"
          brew install "${PROJECT_NAME}"

          INSTALLED_VERSION=$("${PROJECT_NAME}" --version 2>&1 \
            | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          echo "Installed version: ${INSTALLED_VERSION}"
          echo "Expected version:  ${TAG_VERSION}"

          if [ "${INSTALLED_VERSION}" != "${TAG_VERSION}" ]; then
            echo "ERROR: Version mismatch after Homebrew install"
            exit 1
          fi

          brew test "${PROJECT_NAME}"
          echo "Homebrew verification passed ✓"

          brew uninstall "${PROJECT_NAME}"
